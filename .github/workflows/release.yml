name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload installers to GitHub Releases (tag required)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows (x64 + ARM64)
            platform: win
            args: --win --x64 --arm64
          - os: macos-latest
            name: macOS (Universal)
            platform: mac
            args: --mac
          - os: ubuntu-latest
            name: Linux (x64 + ARM64)
            platform: linux
            args: --linux --x64 --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build installers
        run: npx electron-builder ${{ matrix.args }} --publish ${{ ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.publish)) && 'always' || 'never' }}
        env:
          NODE_ENV: production
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch' && !inputs.publish
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.deb
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release is public and Latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          if ! gh release view "$TAG" --json id >/dev/null 2>&1; then
            echo "No GitHub release found for $TAG after electron-builder publish."
            exit 1
          fi

          DRAFT=$(gh release view "$TAG" --json isDraft --jq .isDraft)
          echo "Release $TAG isDraft=$DRAFT"

          # electron-builder with releaseType=release often publishes already.
          # Editing an already-public / immutable release with --draft=false can fail —
          # only undraft when needed.
          if [ "$DRAFT" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease=false
          fi

          gh release edit "$TAG" --latest || true

          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets | length')
          echo "Release $TAG has $ASSETS assets"
          if [ "$ASSETS" -lt 1 ]; then
            echo "Expected installer assets on the release."
            exit 1
          fi

          gh release view "$TAG" --json assets --jq '.assets[].name' | grep -E '^latest(-mac|-linux(-arm64)?)?\.yml$' || {
            echo "Warning: expected electron-updater latest*.yml metadata missing"
            exit 1
          }

          echo "Release $TAG is ready."
