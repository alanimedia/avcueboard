<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>acCompaniment Remote</title>
    <link rel="icon" type="image/png" href="../../assets/icons/icon.png">
    <style>
        body {
            font-family: 'Rewir', 'Arial', 'Helvetica', sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .remote-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2a2a2a; /* Slightly different header background */
            padding: 10px 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .remote-header-left {
            display: flex;
            align-items: center;
        }
        .remote-header-icon {
            width: 32px; /* Adjust size as needed */
            height: 32px;
            margin-right: 10px;
        }
        .remote-header h1 { /* Target h1 inside .remote-header */
            font-family: 'Apropal', 'Arial', 'Helvetica', sans-serif; /* Title font with fallbacks */
            font-size: 1.8em; 
            color: #e0e0e0;
            margin: 0; /* Remove default h1 margins */
        }
        #remoteMain {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }
        #cueGridRemote {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 900px;
            padding: 10px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        .cue-button-remote {
            aspect-ratio: auto;
            min-height: 88px;
            background-color: #3a3a3a;
            border: 1px solid #555555;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 8px;
            color: #e0e0e0;
            overflow: hidden;
            box-sizing: border-box;
        }
        .cue-button-remote:hover:not(.playing):not(.paused):not(.cued) {
            filter: brightness(1.08);
            border-color: #666666;
        }
        .cue-button-remote.has-custom-color:not(.playing):not(.paused):not(.cued) {
            background-color: var(--cue-custom-bg, #3a3a3a);
            color: var(--cue-custom-fg, #e0e0e0);
        }
        .cue-button-remote.has-custom-color:not(.playing):not(.paused):not(.cued) .times,
        .cue-button-remote.has-custom-color:not(.playing):not(.paused):not(.cued) .name {
            color: var(--cue-custom-fg, #e0e0e0);
        }
        .cue-button-remote.has-custom-color:not(.playing):not(.paused):not(.cued) .playlist-item-name {
            color: var(--cue-custom-fg-secondary, #bbbbbb);
        }
        .cue-button-remote.playing {
            background-color: #228b22 !important;
            color: white !important;
        }
        .cue-button-remote.playing:hover {
            background-color: #1e7e1e !important;
        }
         .cue-button-remote.paused {
            background-color: #d97700 !important;
            color: white !important;
        }
        .cue-button-remote.paused:hover {
            background-color: #b36200 !important;
        }
        .cue-button-remote.cued {
            background-color: #ff8c00 !important;
            color: white !important;
        }
        .cue-button-remote.cued:hover {
            background-color: #e67300 !important;
        }
        .cue-remote-body {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 48px;
        }
        .cue-button-remote.has-button-waveform {
            min-height: 120px;
            padding: 8px 8px 0;
        }
        .cue-button-remote .waveform-wrap {
            flex-shrink: 0;
            width: calc(100% + 16px);
            height: 40px;
            margin: 0 -8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.35);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
        }
        .cue-button-remote .waveform-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .cue-button-remote .waveform-wrap.hidden {
            display: none;
        }
        .cue-button-remote .name {
            font-weight: bold;
            font-size: 0.9em;
            word-break: break-word;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .cue-button-remote .playlist-item-name {
            font-size: 0.8em;
            font-style: italic;
            color: #bbbbbb;
            margin-top: 3px;
        }
        .cue-button-remote .times {
            font-size: 0.75em;
            color: inherit;
            width: 100%;
            margin-top: 4px;
            opacity: 0.95;
        }
        .cue-button-remote .times .separator {
            margin: 0 2px;
        }
         .cue-button-remote .times .remaining {
            margin-left: 4px;
            color: #bbbbbb;
        }
        #stopAllButtonRemote {
            background-color: #703030; /* Dark red */
            color: white;
            border: 1px solid #8c3c3c;
            padding: 8px; 
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px; /* Adjusted size for header */
            height: 70px; /* Adjusted size for header */
            margin: 0; /* Remove margins, positioning handled by flex parent */
        }
        #stopAllButtonRemote:hover {
            background-color: #8c3c3c;
        }
        .btn-icon-remote {
            width: 40px;
            height: 40px;
        }

        /* Bottom waveform panel (matches Electron main panel) */
        #remoteWaveformPanel {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 140px;
            background-color: #2c2c2c;
            border-top: 1px solid #555;
            box-sizing: border-box;
        }
        #remoteWaveformPanel.hidden {
            display: none;
        }
        #remoteWaveformResizeHandle {
            flex: 0 0 auto;
            height: 8px;
            cursor: ns-resize;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.08));
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            touch-action: none;
        }
        #remoteWaveformResizeHandle:hover,
        body.remote-waveform-resizing #remoteWaveformResizeHandle {
            background: linear-gradient(to bottom, transparent, rgba(124, 58, 237, 0.35));
        }
        .remote-waveform-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 12px;
            font-size: 0.82em;
            color: #cccccc;
            background: rgba(0, 0, 0, 0.25);
        }
        #remoteWaveformTime {
            font-variant-numeric: tabular-nums;
        }
        #remoteWaveformLanes {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        #remoteWaveformLanes.multi-lane .remote-waveform-lane-header {
            display: flex;
        }
        .remote-waveform-lane {
            flex: 1 1 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .remote-waveform-lane:last-child {
            border-bottom: none;
        }
        .remote-waveform-lane-header {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 1px 8px;
            font-size: 0.72em;
            color: #aaaaaa;
            background: rgba(0, 0, 0, 0.2);
        }
        .remote-waveform-lane-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 8px;
        }
        .remote-waveform-lane-time {
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }
        .remote-waveform-lane-canvas-wrap {
            flex: 1 1 auto;
            min-height: 44px;
            background: rgba(0, 0, 0, 0.35);
        }
        .remote-waveform-lane-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        body.remote-waveform-resizing {
            cursor: ns-resize;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="remote-header">
        <div class="remote-header-left">
            <img src="../../assets/icons/icon.png" alt="acCompaniment Icon" class="remote-header-icon">
            <h1>acCompaniment</h1>
        </div>
        <button id="stopAllButtonRemote">
            <img src="../../assets/icons/dont panic.png" alt="Stop All" class="btn-icon-remote">
        </button>
    </div>
    
    <!-- Diagnostic section removed -->
    
    <div id="remoteMain">
        <div id="cueGridRemote"></div>
    </div>

    <div id="remoteWaveformPanel" class="hidden">
        <div id="remoteWaveformResizeHandle" title="Drag to resize"></div>
        <div class="remote-waveform-header">
            <span id="remoteWaveformTitle">Waveform</span>
            <span id="remoteWaveformTime"></span>
        </div>
        <div id="remoteWaveformLanes"></div>
    </div>

    <script>
        // Ensure this path is correct relative to where remote.html is served from
        // If main.js serves httpServer.js from acCompaniment/src/main, and remote.html is in acCompaniment/src/renderer/remote_control
        // and assets are in acCompaniment/assets, then the path from the HTML to the asset is indeed ../../assets/icons/
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${wsProtocol}//${window.location.host}`);

        const cueGridRemote = document.getElementById('cueGridRemote');
        const stopAllButtonRemote = document.getElementById('stopAllButtonRemote');
        const remoteWaveformPanel = document.getElementById('remoteWaveformPanel');
        const remoteWaveformLanes = document.getElementById('remoteWaveformLanes');
        const remoteWaveformTitle = document.getElementById('remoteWaveformTitle');
        const remoteWaveformTime = document.getElementById('remoteWaveformTime');
        const remoteWaveformResizeHandle = document.getElementById('remoteWaveformResizeHandle');
        let currentCues = {};
        let isTriggeringCueLocked = false;
        const CUE_TRIGGER_LOCK_MS = 500;
        const waveformPeaksCache = new Map();
        const remoteWaveformLaneMap = new Map();
        let remotePanelHeight = parseInt(localStorage.getItem('remoteWaveformHeight') || '140', 10);
        const MIN_REMOTE_PANEL_HEIGHT = 72;
        const MAX_REMOTE_PANEL_HEIGHT_RATIO = 0.55;
        const REMOTE_PANEL_HEADER = 52;
        const REMOTE_LANE_HEADER = 18;
        const MIN_LANE_CANVAS_HEIGHT = 44;
        
        // Diagnostic UI removed

        // --- DEBOUNCE FUNCTION ---
        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), delay);
            };
        }
        // --- END DEBOUNCE FUNCTION ---
        
        // Diagnostic functions
        function noop() {}
        
        function updateMessageInfo(message) {}
        
        function testConnection() {}
        
        function logDiagnosticInfo() {}
        
        // Diagnostic UI removed

        ws.onopen = () => {
            console.log('Connected to acCompaniment WebSocket');
            // Diagnostic UI removed
            ws.send(JSON.stringify({ action: 'request_all_cues_for_remote' }));
        };

        ws.onmessage = (event) => {
            try {
                const message = JSON.parse(event.data);
                updateMessageInfo(message);
                
                if (message.type === 'all_cues') {
                    currentCues = {}; // Reset
                    if (message.payload && Array.isArray(message.payload)) {
                        message.payload.forEach(cue => currentCues[cue.id] = cue);
                        renderAllCuesRemote(message.payload);
                        syncPlayingCuesToRemotePanel();
                    } else {
                        console.error('[DIAGNOSTIC] Remote received all_cues but payload is missing or not an array:', message);
                        renderAllCuesRemote([]); // Render empty or handle error
                    }
                } else if (message.type === 'remote_cue_update') {
                    if (currentCues[message.cue.id]) {
                        Object.assign(currentCues[message.cue.id], message.cue); // Update stored cue
                        updateCueButtonRemote(message.cue);
                        
                    } else {
                        currentCues[message.cue.id] = message.cue; // Add if new
                        // Potentially re-render all or append new, for simplicity, could request all cues again
                        // or just append. For now, we assume updates are for existing.
                        // To handle new cues appearing dynamically, we might need to re-render the grid or add intelligently.
                        // A simple approach for now:
                        ws.send(JSON.stringify({ action: 'request_all_cues_for_remote' }));
                        
                    }
                } else if (message.action === 'pong') {
                    
                } else {
                    
                }
            } catch (error) {
                console.error('Error parsing WebSocket message:', error);
                console.error('Raw message:', event.data);
            }
        };

        ws.onclose = (event) => {
            console.log('WebSocket connection closed:', event.code, event.reason);
            cueGridRemote.innerHTML = `<p style="color: #ff6b6b; text-align: center;">Connection lost. Please refresh the page.</p>`;
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            cueGridRemote.innerHTML = `<p style="color: #ff6b6b; text-align: center;">Connection error. Please refresh.</p>`;
        };

        // Debounced triggerCue function
        const debouncedTriggerCue = debounce(function(cueId) {
            if (isTriggeringCueLocked) {
                console.log(`REMOTE.HTML: Trigger for ${cueId} blocked by global lock.`);
                return;
            }
            
            console.log(`REMOTE.HTML: Sending trigger_cue for ${cueId}`);
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'trigger_cue', cueId: cueId }));
                
                isTriggeringCueLocked = true;
                console.log(`REMOTE.HTML: Global cue trigger lock ENGAGED for ${CUE_TRIGGER_LOCK_MS}ms.`);
                setTimeout(() => {
                    isTriggeringCueLocked = false;
                    console.log('REMOTE.HTML: Global cue trigger lock RELEASED.');
                }, CUE_TRIGGER_LOCK_MS);
            }
        }, 300); // 300ms debounce

        // Debounced stopAllCues function
        const debouncedStopAllCues = debounce(function() {
            console.log('REMOTE.HTML: Sending stop_all_cues');
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'stop_all_cues' }));
            }
        }, 300);

        const DEFAULT_CUE_BUTTON_COLOR = '#3a3a3a';

        function normalizeHexColor(color) {
            if (!color || typeof color !== 'string') return null;
            let hex = color.trim().toLowerCase();
            if (!hex.startsWith('#')) hex = `#${hex}`;
            if (/^#[0-9a-f]{3}$/.test(hex)) {
                hex = `#${hex[1]}${hex[1]}${hex[2]}${hex[2]}${hex[3]}${hex[3]}`;
            }
            return /^#[0-9a-f]{6}$/.test(hex) ? hex : null;
        }

        function getRelativeLuminance(hex) {
            const normalized = normalizeHexColor(hex);
            if (!normalized) return 0;
            const toLinear = (channel) => {
                const c = channel / 255;
                return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            };
            const r = toLinear(parseInt(normalized.slice(1, 3), 16));
            const g = toLinear(parseInt(normalized.slice(3, 5), 16));
            const b = toLinear(parseInt(normalized.slice(5, 7), 16));
            return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        }

        function getContrastTextColors(hex) {
            const useDarkText = getRelativeLuminance(hex) > 0.5;
            return useDarkText
                ? { primary: '#1a1a1a', secondary: 'rgba(0, 0, 0, 0.65)' }
                : { primary: '#e0e0e0', secondary: 'rgba(255, 255, 255, 0.75)' };
        }

        function applyCueButtonAppearance(button, cue, status) {
            const isActiveState = status === 'playing' || status === 'paused' || status === 'cued';
            button.classList.remove('has-custom-color');
            button.style.removeProperty('--cue-custom-bg');
            button.style.removeProperty('--cue-custom-fg');
            button.style.removeProperty('--cue-custom-fg-secondary');
            button.style.removeProperty('background-color');
            button.style.removeProperty('color');

            if (isActiveState) return;

            const normalized = normalizeHexColor(cue.buttonColor);
            if (!normalized || normalized === DEFAULT_CUE_BUTTON_COLOR) return;

            const { primary, secondary } = getContrastTextColors(normalized);
            button.classList.add('has-custom-color');
            button.style.setProperty('--cue-custom-bg', normalized);
            button.style.setProperty('--cue-custom-fg', primary);
            button.style.setProperty('--cue-custom-fg-secondary', secondary);
            button.style.backgroundColor = normalized;
            button.style.color = primary;
        }

        function isActivePlaybackStatus(status) {
            return status === 'playing' || status === 'paused' || status === 'fading';
        }

        function clampRemotePanelHeight(height) {
            const maxHeight = Math.max(MIN_REMOTE_PANEL_HEIGHT, Math.floor(window.innerHeight * MAX_REMOTE_PANEL_HEIGHT_RATIO));
            return Math.min(maxHeight, Math.max(MIN_REMOTE_PANEL_HEIGHT, height));
        }

        function setRemotePanelHeight(height) {
            remotePanelHeight = clampRemotePanelHeight(height);
            if (remoteWaveformPanel) {
                remoteWaveformPanel.style.height = `${remotePanelHeight}px`;
            }
            syncRemoteLanesLayout();
            localStorage.setItem('remoteWaveformHeight', String(remotePanelHeight));
        }

        function bindRemotePanelResize() {
            if (!remoteWaveformResizeHandle || !remoteWaveformPanel) return;
            remoteWaveformResizeHandle.addEventListener('mousedown', (event) => {
                event.preventDefault();
                const startY = event.clientY;
                const startHeight = remoteWaveformPanel.offsetHeight;
                const onMove = (moveEvent) => setRemotePanelHeight(startHeight + (startY - moveEvent.clientY));
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.body.classList.remove('remote-waveform-resizing');
                };
                document.body.classList.add('remote-waveform-resizing');
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        function updateRemotePanelHeader() {
            const count = remoteWaveformLaneMap.size;
            if (!remoteWaveformTitle || !remoteWaveformTime) return;

            if (count === 0) {
                remoteWaveformTitle.textContent = 'Waveform';
                remoteWaveformTime.textContent = '';
                remoteWaveformPanel?.classList.add('hidden');
                return;
            }

            remoteWaveformPanel?.classList.remove('hidden');

            if (count === 1) {
                const lane = remoteWaveformLaneMap.values().next().value;
                remoteWaveformTitle.textContent = lane.cue?.name || 'Cue';
                remoteWaveformTime.style.display = '';
            } else {
                remoteWaveformTitle.textContent = `${count} cues playing`;
                remoteWaveformTime.style.display = 'none';
            }
        }

        function syncRemoteLanesLayout() {
            const count = Math.max(remoteWaveformLaneMap.size, 1);
            const available = Math.max(MIN_LANE_CANVAS_HEIGHT, remotePanelHeight - REMOTE_PANEL_HEADER);
            const multi = remoteWaveformLaneMap.size > 1;
            const perLane = Math.max(MIN_LANE_CANVAS_HEIGHT, Math.floor(available / count) - (multi ? REMOTE_LANE_HEADER : 0));

            remoteWaveformLanes?.classList.toggle('multi-lane', multi);
            remoteWaveformLaneMap.forEach((lane) => {
                if (lane.wrapEl) lane.wrapEl.style.height = `${perLane}px`;
            });
        }

        function removeRemoteLane(cueId) {
            const lane = remoteWaveformLaneMap.get(cueId);
            if (!lane) return;
            lane.laneEl?.remove();
            remoteWaveformLaneMap.delete(cueId);
            updateRemotePanelHeader();
            syncRemoteLanesLayout();
        }

        async function ensureRemoteLane(cue) {
            if (!cue?.id || !cue.hasWaveform) return;

            if (remoteWaveformLaneMap.has(cue.id)) {
                remoteWaveformLaneMap.get(cue.id).cue = cue;
                return;
            }

            const peaksData = await loadWaveformPeaksForCue(cue);
            if (!peaksData) return;

            const laneEl = document.createElement('div');
            laneEl.className = 'remote-waveform-lane';
            laneEl.dataset.cueId = cue.id;

            const headerEl = document.createElement('div');
            headerEl.className = 'remote-waveform-lane-header';
            headerEl.innerHTML = '<span class="remote-waveform-lane-name"></span><span class="remote-waveform-lane-time"></span>';
            headerEl.querySelector('.remote-waveform-lane-name').textContent = cue.name || 'Cue';

            const wrapEl = document.createElement('div');
            wrapEl.className = 'remote-waveform-lane-canvas-wrap';
            const canvas = document.createElement('canvas');
            canvas.className = 'remote-waveform-lane-canvas';
            wrapEl.appendChild(canvas);

            laneEl.appendChild(headerEl);
            laneEl.appendChild(wrapEl);
            remoteWaveformLanes.appendChild(laneEl);

            const lane = {
                cue,
                peaksData,
                laneEl,
                headerEl,
                wrapEl,
                canvas,
                timeEl: headerEl.querySelector('.remote-waveform-lane-time')
            };
            remoteWaveformLaneMap.set(cue.id, lane);
            syncRemoteLanesLayout();
            redrawRemoteLane(cue);
            updateRemotePanelHeader();
        }

        function getCueDurationForDisplay(cue) {
            let total = cue.currentItemDurationS;
            if (total === undefined || total === null) total = cue.initialTrimmedDurationS;
            if (total === undefined || total === null) total = cue.knownDurationS;
            return total || 0;
        }

        function redrawRemoteLane(cue) {
            const lane = remoteWaveformLaneMap.get(cue.id);
            if (!lane) return;

            drawWaveformOnCanvas(lane.canvas, lane.peaksData, cue);

            const current = cue.currentTimeS || 0;
            const total = getCueDurationForDisplay(cue);
            const timeStr = `${formatTimeMMSS(current)} / ${formatTimeMMSS(total)}`;

            if (remoteWaveformLaneMap.size === 1 && remoteWaveformTime) {
                remoteWaveformTime.textContent = timeStr;
            }
            if (lane.timeEl) {
                lane.timeEl.textContent = timeStr;
            }
        }

        async function handleRemoteWaveformUpdate(cue) {
            if (!cue?.id || !cue.hasWaveform) {
                if (cue?.status === 'stopped') removeRemoteLane(cue.id);
                return;
            }

            const status = cue.status || 'stopped';
            if (isActivePlaybackStatus(status)) {
                const prevItem = remoteWaveformLaneMap.get(cue.id)?.cue?.playlistItemName;
                if (remoteWaveformLaneMap.has(cue.id) && cue.playlistItemName !== prevItem) {
                    removeRemoteLane(cue.id);
                }
                await ensureRemoteLane(cue);
                redrawRemoteLane(cue);
            } else if (status === 'stopped') {
                removeRemoteLane(cue.id);
            }
        }

        function syncPlayingCuesToRemotePanel() {
            Object.values(currentCues).forEach((cue) => {
                if (isActivePlaybackStatus(cue.status)) {
                    handleRemoteWaveformUpdate(cue);
                }
            });
        }

        function shouldShowButtonWaveform(cue) {
            return cue && cue.effectiveShowButtonWaveform === true && cue.hasWaveform;
        }

        function buildCueForWaveformDraw(cue) {
            const trimStart = cue.trimStartTime || 0;
            const knownDuration = cue.knownDurationS || cue.knownDuration || 0;
            const currentTime = cue.currentTimeS || 0;
            let total = cue.currentItemDurationS;
            if (total === undefined || total === null) total = cue.initialTrimmedDurationS;
            if (total === undefined || total === null) total = knownDuration;
            const fileProgressRatio = knownDuration > 0
                ? Math.min(1, Math.max(0, (trimStart + currentTime) / knownDuration))
                : (typeof cue.fileProgressRatio === 'number' ? cue.fileProgressRatio : 0);
            return {
                ...cue,
                fileProgressRatio,
                progressRatio: total > 0 ? currentTime / total : 0
            };
        }

        async function ensureWaveformForButton(button, cue) {
            const wrap = button.querySelector('.waveform-wrap');
            const canvas = button.querySelector('.waveform-canvas');
            if (!wrap || !canvas) return;

            if (!shouldShowButtonWaveform(cue)) {
                button.classList.remove('has-button-waveform');
                wrap.classList.add('hidden');
                return;
            }

            button.classList.add('has-button-waveform');
            wrap.classList.remove('hidden');
            const peaksData = await loadWaveformPeaksForCue(cue);
            if (!peaksData) {
                wrap.classList.add('hidden');
                return;
            }
            drawWaveformOnCanvas(canvas, peaksData, buildCueForWaveformDraw(cue));
        }

        function updateWaveformPlayhead(button, cue) {
            if (!shouldShowButtonWaveform(cue)) return;
            const canvas = button.querySelector('.waveform-canvas');
            if (!canvas) return;
            const cacheKey = `${cue.id}::${cue.playlistItemName || ''}`;
            const peaksData = waveformPeaksCache.get(cacheKey);
            if (peaksData) {
                drawWaveformOnCanvas(canvas, peaksData, buildCueForWaveformDraw(cue));
            }
        }

        function getWaveformPeaksUrl(cueId, playlistItemName) {
            const params = new URLSearchParams();
            if (playlistItemName) {
                params.set('playlistItemName', playlistItemName);
            }
            const query = params.toString();
            return `/api/cues/${encodeURIComponent(cueId)}/waveform-peaks${query ? `?${query}` : ''}`;
        }

        async function loadWaveformPeaksForCue(cue) {
            if (!cue || !cue.hasWaveform) return null;
            const cacheKey = `${cue.id}::${cue.playlistItemName || ''}`;
            if (waveformPeaksCache.has(cacheKey)) {
                return waveformPeaksCache.get(cacheKey);
            }
            try {
                const response = await fetch(getWaveformPeaksUrl(cue.id, cue.playlistItemName));
                if (!response.ok) return null;
                const data = await response.json();
                if (!data.success || !Array.isArray(data.peaks)) return null;
                waveformPeaksCache.set(cacheKey, data);
                return data;
            } catch (error) {
                console.warn(`REMOTE: Failed to load waveform peaks for cue ${cue.id}`, error);
                return null;
            }
        }

        function drawWaveformOnCanvas(canvas, peaksData, cue) {
            if (!canvas || !peaksData || !Array.isArray(peaksData.peaks) || peaksData.peaks.length === 0) {
                return;
            }

            const wrap = canvas.parentElement;
            const width = Math.max(1, wrap ? wrap.clientWidth : canvas.clientWidth || 160);
            const height = Math.max(1, wrap ? wrap.clientHeight : canvas.clientHeight || 36);
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(width * dpr);
            canvas.height = Math.floor(height * dpr);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;

            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, width, height);

            const fullDuration = peaksData.duration || cue.knownDurationS || 0;
            const trimStart = cue.trimStartTime || 0;
            const trimEnd = cue.trimEndTime && cue.trimEndTime > trimStart ? cue.trimEndTime : fullDuration;
            const trimStartRatio = fullDuration > 0 ? trimStart / fullDuration : 0;
            const trimEndRatio = fullDuration > 0 ? Math.min(1, trimEnd / fullDuration) : 1;

            const peaks = peaksData.peaks;
            const midY = height / 2;
            const barWidth = Math.max(1, width / peaks.length);

            ctx.fillStyle = 'rgba(79, 70, 229, 0.85)';
            for (let i = 0; i < peaks.length; i++) {
                const x = (i / peaks.length) * width;
                const ratio = i / peaks.length;
                const amplitude = peaks[i] * (height * 0.42);
                if (ratio < trimStartRatio || ratio > trimEndRatio) {
                    ctx.fillStyle = 'rgba(120, 120, 120, 0.55)';
                } else {
                    ctx.fillStyle = 'rgba(79, 70, 229, 0.85)';
                }
                ctx.fillRect(x, midY - amplitude, Math.max(1, barWidth), amplitude * 2);
            }

            const playheadRatio = typeof cue.fileProgressRatio === 'number'
                ? cue.fileProgressRatio
                : (typeof cue.progressRatio === 'number' ? cue.progressRatio : 0);
            const playheadX = Math.min(width - 1, Math.max(0, playheadRatio * width));

            ctx.strokeStyle = '#EF4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(playheadX, 0);
            ctx.lineTo(playheadX, height);
            ctx.stroke();
        }

        function formatTimeMMSS(seconds, showMs = false) {
            if (isNaN(seconds) || seconds === null || seconds === undefined) {
                return showMs ? "0:00.0" : "0:00";
            }
            const isNegative = seconds < 0;
            const absSeconds = Math.abs(seconds);
            const m = Math.floor(absSeconds / 60);
            const s = Math.floor(absSeconds % 60);
            const ms = Math.floor((absSeconds - Math.floor(absSeconds)) * 10);
            return `${isNegative ? '-' : ''}${m}:${s < 10 ? '0' : ''}${s}${showMs ? '.' + ms : ''}`;
        }
        
        function updateButtonTextContent(button, cue) {
            const nameElem = button.querySelector('.name');
            const timesElem = button.querySelector('.times');
            const currentElem = button.querySelector('.current-time');
            const totalElem = button.querySelector('.total-time');
            const remainingElem = button.querySelector('.remaining-time');
            const separatorElem = button.querySelector('.separator');

            let baseName = cue.name || 'Unnamed Cue';
            let playlistInfo = '';

            if (cue.type === 'playlist') {
                if (cue.status === 'playing' || cue.status === 'paused') {
                    if (cue.playlistItemName) {
                        playlistInfo += `<span class="playlist-item-name">(${cue.status === 'playing' ? 'Now' : 'Paused'}: ${cue.playlistItemName})</span>`;
                    }
                    if (cue.nextPlaylistItemName) {
                        playlistInfo += `<span class="playlist-item-name">(Next: ${cue.nextPlaylistItemName})</span>`;
                    }
                } else if (cue.status === 'cued' || cue.status === 'stopped' || !cue.status) { // Idle or cued
                     if (cue.nextPlaylistItemName) {
                        playlistInfo = `<span class="playlist-item-name">(Next: ${cue.nextPlaylistItemName})</span>`;
                    }
                }
            }
            nameElem.innerHTML = baseName + (playlistInfo ? `<br>${playlistInfo}` : '');
            
            let currentTimeS = cue.currentTimeS || 0;
            // Prioritize live duration, then initial trimmed, then original known duration.
            let totalDurationS = cue.currentItemDurationS; // This should be live/actual item duration
            if (totalDurationS === undefined || totalDurationS === null) {
                totalDurationS = cue.initialTrimmedDurationS; // From all_cues payload
            }
            if (totalDurationS === undefined || totalDurationS === null) {
                totalDurationS = cue.knownDurationS; // Original file duration from all_cues
            }
             if (totalDurationS === undefined || totalDurationS === null) {
                totalDurationS = 0;
            }


            let remainingTimeS = totalDurationS - currentTimeS;
            if (remainingTimeS < 0) remainingTimeS = 0;


            currentElem.textContent = formatTimeMMSS(currentTimeS);
            totalElem.textContent = formatTimeMMSS(totalDurationS);
            remainingElem.textContent = (currentTimeS > 0 || totalDurationS > 0) ? `-${formatTimeMMSS(remainingTimeS)}` : '';
            separatorElem.style.display = (currentTimeS > 0 || totalDurationS > 0) ? 'inline' : 'none';
            remainingElem.style.display = (currentTimeS > 0 || totalDurationS > 0) ? 'inline' : 'none';

            updateWaveformPlayhead(button, cue);
        }


        function renderAllCuesRemote(cues) {
            cueGridRemote.innerHTML = ''; // Clear existing
            if (!cues || cues.length === 0) {
                cueGridRemote.innerHTML = '<p style="text-align: center; color: #888;">No cues available.</p>';
                return;
            }
            cues.forEach(cue => {
                const button = document.createElement('div');
                button.className = 'cue-button-remote';
                button.dataset.cueId = cue.id;
                
                // Unique ID for the button element for easier updates
                button.id = `cue-btn-${cue.id}`;

                // Structure for name and times
                button.innerHTML = `
                    <div class="cue-remote-body">
                        <span class="name"></span>
                        <div class="times">
                            <span class="current-time"></span>
                            <span class="separator">/</span>
                            <span class="total-time"></span>
                            <span class="remaining-time"></span>
                        </div>
                    </div>
                    <div class="waveform-wrap hidden">
                        <canvas class="waveform-canvas"></canvas>
                    </div>
                `;
                
                updateButtonTextContent(button, cue);
                updateButtonStatusClass(button, cue.status, cue);
                ensureWaveformForButton(button, cue);

                // Use the debounced function in the event listener
                button.addEventListener('click', () => debouncedTriggerCue(cue.id)); 
                
                cueGridRemote.appendChild(button);
            });
        }

        function updateCueButtonRemote(cue) {
            const button = cueGridRemote.querySelector(`.cue-button-remote[data-cue-id="${cue.id}"]`);
            const mergedCue = { ...currentCues[cue.id], ...cue };
            if (button) {
                updateButtonTextContent(button, mergedCue);
                updateButtonStatusClass(button, mergedCue.status, mergedCue);
                ensureWaveformForButton(button, mergedCue);
            }
            handleRemoteWaveformUpdate(mergedCue);
        }

        function updateButtonStatusClass(button, status, cue) {
            button.classList.remove('playing', 'paused', 'cued');
            if (status === 'playing') {
                button.classList.add('playing');
            } else if (status === 'paused') {
                button.classList.add('paused');
            } else if (status === 'cued') {
                button.classList.add('cued');
            }
            applyCueButtonAppearance(button, cue || {}, status);
        }
        
        if (stopAllButtonRemote) {
            stopAllButtonRemote.addEventListener('click', debouncedStopAllCues);
        }

        setRemotePanelHeight(remotePanelHeight);
        bindRemotePanelResize();
        window.addEventListener('resize', () => syncRemoteLanesLayout());

    </script>
</body>
</html>
